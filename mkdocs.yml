site_name: mooGP documentation
theme:
  name: mkdocs
  logo: https://raw.githubusercontent.com/evancbarnett/moogp/mkdocs/logo/moogp_logo_core.svg
repo_url: https://github.com/evancbarnett/moogp/
docs_dir: examples
nav:
  - Getting Started: 00_getting_started.ipynb
  - Example Usage:
    - Trend: 01_trend_specification.ipynb
  - README: index.md
plugins:
  - mkdocs-jupyter:
      execute: true
  - include-markdown
  - search
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js