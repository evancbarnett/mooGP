site_name: mooGP documentation
theme:
  name: mkdocs
  logo: https://raw.githubusercontent.com/evancbarnett/moogp/mkdocs/logo/moogp_logo_core.svg
repo_url: https://github.com/evancbarnett/moogp/
docs_dir: examples
nav:
  - Getting Started: 00_getting_started.ipynb
  - Example Usage:
    - Trend: 01_trend_specification.ipynb
    - Choosing q: 02_choosing_q.ipynb
    - Measurement noise: 03_measurement_noise.ipynb
    - Standardization: 04_standardization.ipynb
    - Optimizer control: 05_optimizer_control.ipynb
    - Kernel & mixing matrix: 06_kernel_and_mixing_matrix.ipynb
  - README: index.md
plugins:
  - mkdocs-jupyter:
      execute: true
  - include-markdown
  - search
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js